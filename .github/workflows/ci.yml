# MAPI Portal — Continuous Integration
# Every push/PR: type-check + production build + E2E smoke tests.
# A red X on the commit means "do not deploy" — broken builds and broken
# user journeys are caught the moment they land, not in production.

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  verify:
    name: Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit --skipLibCheck

      - name: Production build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # Reuse the build in the e2e job
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 1
          include-hidden-files: true

  e2e:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npx playwright test
        env:
          CI: "true"

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
