# MAPI Portal — Continuous Integration
# Runs on every push and PR: type-check + production build.
# A red X on the commit means "do not deploy" — catches broken builds
# the moment they land, instead of discovering them in production.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit --skipLibCheck

      - name: Production build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
