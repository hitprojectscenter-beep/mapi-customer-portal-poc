<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="לוגו המרכז למיפוי ישראל">
  <title>המרכז למיפוי ישראל</title>
  <defs>
    <!-- Text arc — left side, reading bottom-to-top following the rim -->
    <path id="mapi-left-arc" d="M 52 186 A 104 104 0 0 0 52 52" fill="none" />
    <clipPath id="mapi-globe-clip">
      <circle cx="130" cy="120" r="45" />
    </clipPath>
  </defs>

  <!-- Brand color: MAPI blue -->
  <g stroke="#3D6FA8" fill="none">
    <!-- Dynamic orbit ellipses swirling around the globe -->
    <ellipse cx="130" cy="118" rx="92" ry="34" stroke-width="7.5" transform="rotate(-28 130 118)" />
    <ellipse cx="128" cy="120" rx="88" ry="40" stroke-width="7.5" transform="rotate(-64 128 120)" />
    <ellipse cx="132" cy="120" rx="95" ry="29" stroke-width="6" transform="rotate(6 132 120)" opacity="0.85" />
  </g>

  <!-- Globe with graticule grid -->
  <circle cx="130" cy="120" r="45" fill="#ffffff" stroke="#3D6FA8" stroke-width="2.5" />
  <g clip-path="url(#mapi-globe-clip)" stroke="#3D6FA8" stroke-width="1.5" fill="none">
    <!-- Meridians -->
    <line x1="130" y1="75" x2="130" y2="165" />
    <ellipse cx="130" cy="120" rx="11" ry="45" />
    <ellipse cx="130" cy="120" rx="22" ry="45" />
    <ellipse cx="130" cy="120" rx="33" ry="45" />
    <ellipse cx="130" cy="120" rx="42" ry="45" />
    <!-- Parallels -->
    <line x1="85" y1="120" x2="175" y2="120" />
    <ellipse cx="130" cy="120" rx="45" ry="11" />
    <ellipse cx="130" cy="120" rx="45" ry="22" />
    <ellipse cx="130" cy="120" rx="45" ry="33" />
    <ellipse cx="130" cy="120" rx="45" ry="42" />
  </g>

  <!-- Survey-ray fan: beams from a point above the globe sweeping across its face -->
  <g clip-path="url(#mapi-globe-clip)" stroke="#3D6FA8" stroke-width="1.8" fill="none" opacity="0.95">
    <line x1="104" y1="70" x2="96"  y2="150" />
    <line x1="104" y1="70" x2="106" y2="155" />
    <line x1="104" y1="70" x2="118" y2="158" />
    <line x1="104" y1="70" x2="130" y2="158" />
    <line x1="104" y1="70" x2="142" y2="154" />
    <line x1="104" y1="70" x2="153" y2="146" />
    <line x1="104" y1="70" x2="162" y2="135" />
    <line x1="104" y1="70" x2="168" y2="121" />
  </g>

  <!-- Hebrew name curving along the left rim (reads bottom-to-top) -->
  <text font-family="Heebo, 'David Libre', 'Frank Ruehl CLM', Arial, sans-serif" font-size="19" font-weight="700" fill="#3D6FA8" letter-spacing="0.5">
    <textPath href="#mapi-left-arc" startOffset="50%" text-anchor="middle">המרכז למיפוי ישראל</textPath>
  </text>
</svg>
