<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label='לוגו המרכז למיפוי ישראל'>
  <title>המרכז למיפוי ישראל</title>
  <defs>
    <linearGradient id="mapiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f4e79"/>
      <stop offset="100%" stop-color="#0b61a1"/>
    </linearGradient>
  </defs>

  <!-- Outer ring (globe shell) -->
  <circle cx="120" cy="118" r="78" fill="none" stroke="url(#mapiGrad)" stroke-width="6"/>

  <!-- Equator (horizontal latitude) -->
  <ellipse cx="120" cy="118" rx="78" ry="18" fill="none" stroke="url(#mapiGrad)" stroke-width="4"/>

  <!-- Meridian / vertical latitude -->
  <ellipse cx="120" cy="118" rx="32" ry="78" fill="none" stroke="url(#mapiGrad)" stroke-width="4"/>
  <ellipse cx="120" cy="118" rx="60" ry="78" fill="none" stroke="url(#mapiGrad)" stroke-width="3" opacity="0.65"/>

  <!-- Diagonal axis (Israel orientation hint) -->
  <line x1="62" y1="76" x2="178" y2="160" stroke="url(#mapiGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Stylized upper arc / "wave" -->
  <path d="M 70 56 Q 120 22 170 56" fill="none" stroke="url(#mapiGrad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Hebrew text - curved around bottom -->
  <path id="curve" d="M 30 145 Q 120 245 210 145" fill="none"/>
  <text font-family="'Heebo','Arial',sans-serif" font-size="20" font-weight="700" fill="#1f4e79" letter-spacing="0.5">
    <textPath href="#curve" startOffset="50%" text-anchor="middle">המרכז למיפוי ישראל</textPath>
  </text>
</svg>
