<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label='לוגו המרכז למיפוי ישראל'>
  <title>המרכז למיפוי ישראל</title>

  <!-- Outer ring (globe shell) -->
  <circle cx="120" cy="118" r="78" fill="none" stroke="#ffffff" stroke-width="6"/>

  <!-- Equator -->
  <ellipse cx="120" cy="118" rx="78" ry="18" fill="none" stroke="#ffffff" stroke-width="4"/>

  <!-- Meridians -->
  <ellipse cx="120" cy="118" rx="32" ry="78" fill="none" stroke="#ffffff" stroke-width="4"/>
  <ellipse cx="120" cy="118" rx="60" ry="78" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.7"/>

  <!-- Diagonal axis -->
  <line x1="62" y1="76" x2="178" y2="160" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

  <!-- Upper arc -->
  <path d="M 70 56 Q 120 22 170 56" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>

  <!-- Hebrew text - curved around bottom -->
  <path id="curve-w" d="M 30 145 Q 120 245 210 145" fill="none"/>
  <text font-family="'Heebo','Arial',sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    <textPath href="#curve-w" startOffset="50%" text-anchor="middle">המרכז למיפוי ישראל</textPath>
  </text>
</svg>
